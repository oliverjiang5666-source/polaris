# ==============================================================================
# 甘肃电力现货市场规则（V3.2，2026-04）
# ==============================================================================
# 数据来源：《甘肃电力现货市场管理实施细则_V3.2_2026年4月.pdf》
# 适用范围：新能源场站（风电/光伏）参与日前 + 实时现货市场
#
# 每条规则标注出处（附件号 + 条款号），便于审计和升级。

province: gansu
version: V3.2
effective_date: "2026-04-01"
source: "甘肃电力现货市场管理实施细则_V3.2_2026年4月.pdf"

# ==============================================================================
# 1. 市场结构
# ==============================================================================
market:
  steps_per_day: 96                  # 15 分钟粒度（附件2·第4条）
  minutes_per_step: 15
  settlement_mode: "day_clear_month_settle"  # 日清月结（附件3·第9条）
  pricing: "LMP"                     # 节点边际电价（附件2·第60条）

  # 结算模式（附件3·第12条）：甘肃采用方式二
  settlement_method: "method_2"      # 中长期合同 + 日前偏差 + 实时偏差

  # 日前申报时间线（附件2·第15-26条）
  timeline:
    da_bid_deadline: "D-1 08:00"      # 电源企业日前申报截止
    user_bid_deadline: "D-1 12:00"    # 用户日前申报截止
    pre_balance_done: "D-1 10:30"     # 预平衡发布
    da_clear_result: "D-1 17:30"      # 日前出清结果
    da_result_publish: "D-1 22:00"    # 正式发布

# ==============================================================================
# 2. 新能源场站报价规则（附件2·第32条一项）
# ==============================================================================
bid_curve:
  # 段数
  min_steps: 3
  max_steps: 10

  # 每段量的下限（相对装机容量）
  min_step_fraction_of_capacity: 0.10   # 每段 ≥ 装机容量 10%

  # 精度
  quantity_precision_mw: 0.001          # 0.001 MW
  price_precision_yuan_per_mwh: 10.0    # 10 元/MWh

  # 价格单调性（发电侧）
  monotonic: "non_decreasing"           # 量价曲线必须单调非递减

  # 覆盖范围
  coverage: "full"                      # 0 至最大技术出力全覆盖
                                         # Σ q_k = capacity（非 forecast）

# ==============================================================================
# 3. 新能源场站出力约束（附件2·第37、80条）
# ==============================================================================
renewable_output:
  # 日前市场出力上限 = D-1 短期功率预测
  da_upper_bound: "short_term_forecast"

  # 实时市场出力上限 = D 日超短期预测
  rt_upper_bound: "ultra_short_term_forecast"

  # 出力下限
  lower_bound_mw: 0.0

  # 未报功率预测时的默认
  missing_forecast_default: 0.0

  # 关键约束：新能源场站不可"超报"
  # 申报总量 ≤ 功率预测（这是硬约束，不像火电可报到最大技术出力）
  cannot_over_bid: true

# ==============================================================================
# 4. 价格限值（附件2·第31条，具体数值需从价格主管部门文件补）
# ==============================================================================
price_limits:
  # 申报价格上下限（元/MWh）
  bid_price_lower: null                 # 待从价格政策文件补
  bid_price_upper: null                 # 待从价格政策文件补

  # 出清价格上下限（元/MWh）
  clearing_price_lower: null            # 待补
  clearing_price_upper: null            # 待补

  # 若出清价超限，按限值结算
  clearing_clip_to_limits: true

# ==============================================================================
# 5. 结算公式参数（附件3·第 20-24 条）
# ==============================================================================
settlement:
  # 发电侧电能量电费公式
  # R = R^中长期电量 + R^中长期阻塞 + R^日前 + R^实时
  #
  # R^中长期电量 = Q^MLT × P^MLT                     (第21条)
  # R^中长期阻塞 = Q^MLT × (P^DA_node - P^ref)       (第22条)
  # R^日前 = (Q^DA - Q^MLT) × P^DA_node              (第23条)
  # R^实时 = (Q^actual - Q^DA_total) × P^RT_node     (第24条)

  components:
    mlt_energy: true                    # 中长期电量电费
    mlt_congestion: true                # 中长期阻塞对冲
    da_spot: true                       # 日前现货
    rt_spot: true                       # 实时现货偏差

  # ⚠️  甘肃没有以下虚构机制（之前 evaluator.py 编的）
  # ⚠️  必须从设置中移除
  NO_deviation_penalty_above_bound: true    # 无 ±10% 加罚
  NO_reverse_penalty: true                   # 无反向加罚

  # 节点 vs 统一结算点
  use_node_lmp: true                    # 发电侧按节点边际电价结算
  reference_point: "unified_settlement_point"  # 中长期结算参考点

# ==============================================================================
# 6. 新能源调频增发超额回收（附件3·第44条）
# ==============================================================================
# 防止新能源出清环节持留发电能力
# 对新能源辅助调频增发电量的超额收益进行回收
# R^调频增发回收 = Q^辅助调频 × (P^实时 - P^出清下限)
# Q^辅助调频 = Max(Q^实际 - Q^实时计划, 0)
frequency_regulation_clawback:
  enabled: true
  # 仅对"参与调频增发"的新能源生效
  # 对普通未参与调频的场站，本项不适用
  # Logan v1 假设不参与调频，默认 clawback = 0
  participates_in_frequency_regulation: false

# ==============================================================================
# 7. 阻塞风险对冲费用（附件3·第47-49条）
# ==============================================================================
# 对新能源/火电因中长期合同产生的阻塞费用进行对冲
# 节点价 ≥ 统一价 → 回收（负值）
# 节点价 < 统一价 → 补偿（正值）
congestion_hedge:
  enabled: true
  # 对新能源：
  # R^对冲 = Σ min(Q^actual, max(0, Q^MLT)) × (P^DA_unified - P^DA_node)
  # 注：此项 Q^MLT=0 时（无中长期合同）为 0，不影响只做现货的场景

# ==============================================================================
# 8. 装机容量约束
# ==============================================================================
# Logan v1 默认参数，实际每个场站不同
plant_defaults:
  capacity_mw: 100.0                    # 装机容量
  min_forecast_fraction: 0.0            # 预测最低值（风光可为 0）

# ==============================================================================
# 9. 特殊情况规则（附件3·第54条）
# ==============================================================================
special_cases:
  # 系统缺电时不进行日前偏差结算
  system_shortage_skip_da_settlement: true
  # 日前出清失败时的处理
  da_clearing_failure_use_rt: true
